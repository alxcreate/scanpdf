server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # opencv.js is ~10MB of JS; gzip brings it to ~3MB.
    gzip on;
    gzip_types application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # The CSP enforces the offline guarantee: any accidental request to an
    # external origin is blocked by the browser. 'unsafe-eval' is required by
    # the OpenCV.js build (Emscripten uses eval; 'wasm-unsafe-eval' alone is
    # not enough); the offline guarantee itself comes from default-src /
    # connect-src being restricted to 'self'.
    # connect-src allows data:/blob: because OpenCV.js fetches its embedded
    # WASM binary via a data: URL — no network involved.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' blob: data:; connect-src 'self' data: blob:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;

    # `expires` (unlike add_header) does not cancel the inherited headers above.
    location /vendor/ {
        expires 1y;
    }
}
