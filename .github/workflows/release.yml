name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  bundle:
    name: Offline bundle → GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch + verify pinned vendor libraries
        run: ./tools/vendor.sh

      - name: Assemble offline bundle
        run: |
          set -eu
          NAME="scanpdf-${GITHUB_REF_NAME}"
          mkdir -p "dist/$NAME"
          cp -R site "dist/$NAME/site"
          cp LICENSE THIRD_PARTY_LICENSES.md README.md nginx.conf Dockerfile "dist/$NAME/"
          cd dist
          zip -r "$NAME.zip" "$NAME" >/dev/null
          sha256sum "$NAME.zip" > "$NAME.zip.sha256"
          echo "Built $NAME.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          body: |
            ## Artifacts

            - **`scanpdf-${{ github.ref_name }}.zip`** — self-contained offline
              bundle: the full static app with the pinned, SHA-256-verified
              vendor libraries (OpenCV.js, pdf-lib) already baked in. Serve
              `site/` with any static file server, or `docker build .` locally
              with no internet access. Verify with the accompanying `.sha256`.
            - **Container image** —
              `docker run -d --rm -p 8080:80 ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
              (also tagged `latest`). This is the CSP-enforced offline path:
              the nginx config serves a strict `Content-Security-Policy` that
              makes the browser block every external request.

            Both bundle and image redistribute third-party libraries under their
            own licenses — see `THIRD_PARTY_LICENSES.md`.

  image:
    name: Multi-arch image → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Derive image tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
